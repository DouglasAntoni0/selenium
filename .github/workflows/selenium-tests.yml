name: Selenium WebDriver Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: selenium-webdriver-main
  cancel-in-progress: true

jobs:
  selenium:
    name: Mocha + Selenium + Chrome Headless
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BASE_URL: https://practicesoftwaretesting.com
      API_URL: https://api.practicesoftwaretesting.com
      HEADLESS: true
      UI_TIMEOUT_MS: 120000
      PAGE_LOAD_TIMEOUT_MS: 120000
      RETRY_ATTEMPTS: 0
      USE_PACKAGED_CHROMEDRIVER: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup latest Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Setup Chrome for Testing
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 149
          install-chromedriver: true
          install-dependencies: true

      - name: Install dependencies
        run: npm install

      - name: Show browser versions
        run: |
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version
          "${{ steps.setup-chrome.outputs.chromedriver-path }}" --version

      - name: Preflight Selenium browser session
        env:
          CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_BINARY: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: timeout 90s node -e "const {buildDriver}=require('./src/driver/driverFactory'); (async()=>{const d=await buildDriver(); await d.get('about:blank'); console.log('selenium-preflight-ok'); await d.quit();})().catch(e=>{console.error(e); process.exit(1);});"

      - name: Run Selenium suite in headless Chrome
        env:
          CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_BINARY: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: npm run test:report

      - name: Upload Mochawesome report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: mochawesome-report
          if-no-files-found: warn
